<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">

    {% seo %}
    {% include head-custom.html %}

    <style>
      /* ── Reset & Base ─────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:         #0c0d12;
        --surface:    #13141b;
        --surface-2:  #1a1c25;
        --border:     #2a2d3e;
        --text:       #ddd8cc;
        --text-muted: #7a7a8c;
        --gold:       #c9a96e;
        --gold-dim:   #8a6e42;
        --blue:       #5b8fb9;
        --serif: 'Cormorant Garamond', Georgia, serif;
        --sans:  'DM Sans', sans-serif;
        --mono:  'DM Mono', monospace;
      }

      html { scroll-behavior: smooth; }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-weight: 300;
        font-size: 16px;
        line-height: 1.75;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ── Grain overlay ────────────────────────────────────────────── */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
        opacity: 0.025;
        pointer-events: none;
        z-index: 999;
      }

      /* ── Header ───────────────────────────────────────────────────── */
      header {
        position: relative;
        border-bottom: 1px solid var(--border);
        padding: 2rem 0 1.75rem;
        overflow: hidden;
      }

      header::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 0;
        width: 120px;
        height: 2px;
        background: var(--gold);
      }

      /* Decorative large letter — removed */

      .header-inner {
        max-width: 860px;
        margin: 0 auto;
        padding: 0 2rem;
        position: relative;
        z-index: 1;
      }

      header .eyebrow {
        font-family: var(--mono);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        color: var(--gold);
        text-transform: uppercase;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      header .eyebrow::after {
        content: '';
        display: inline-block;
        width: 32px;
        height: 1px;
        background: var(--gold-dim);
      }

      header h1 {
        font-family: var(--serif);
        font-size: clamp(2.6rem, 6vw, 4.2rem);
        font-weight: 300;
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: var(--text);
        margin-bottom: 0.6rem;
      }

      header h2 {
        font-family: var(--sans);
        font-size: 0.9rem;
        font-weight: 300;
        color: var(--text-muted);
        letter-spacing: 0.04em;
      }

      /* ── Layout wrapper ───────────────────────────────────────────── */
      #content-wrapper {
        max-width: 860px;
        margin: 0 auto;
        padding: 1rem 2rem 6rem;
      }

      /* ── Main content (rendered markdown) ────────────────────────── */
      #main-content {
        animation: fadeUp 0.6s ease both;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Social badges area */
      #main-content > p:first-child {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 2rem;
      }

      #main-content > p:first-child img {
        height: 28px;
        transition: opacity 0.2s, transform 0.2s;
        border-radius: 3px;
      }

      #main-content > p:first-child img:hover {
        opacity: 0.85;
        transform: translateY(-1px);
      }

      /* Intro paragraph */
      #main-content > p:nth-child(2) {
        font-size: 1.05rem;
        line-height: 1.85;
        color: var(--text);
        margin-bottom: 2.5rem;
        padding-left: 1.25rem;
        border-left: 2px solid var(--gold-dim);
      }

      /* Section headings (## in markdown) */
      #main-content h2 {
        font-family: var(--serif);
        font-size: 2rem;
        font-weight: 300;
        font-style: italic;
        color: var(--text);
        margin: 3.5rem 0 1.5rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--border);
        position: relative;
        letter-spacing: -0.01em;
      }

      #main-content h2::before {
        content: attr(data-number);
        font-family: var(--mono);
        font-size: 0.65rem;
        color: var(--gold);
        letter-spacing: 0.15em;
        position: absolute;
        top: 0.35rem;
        right: 0;
      }

      /* Horizontal rule → section divider */
      #main-content hr {
        display: none;
      }

      /* Lists */
      #main-content ul {
        list-style: none;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      #main-content ul li {
        padding: 0.8rem 1rem 0.8rem 1.5rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid var(--border);
        border-radius: 0 6px 6px 0;
        font-size: 0.93rem;
        line-height: 1.7;
        transition: border-left-color 0.2s, background 0.2s;
        position: relative;
      }

      #main-content ul li:hover {
        border-left-color: var(--gold);
        background: var(--surface-2);
      }

      /* Bold text in lists — inline, golden, monospace */
      #main-content ul li strong {
        font-family: var(--mono);
        font-size: 0.82rem;
        font-weight: 400;
        color: var(--gold);
        letter-spacing: 0.04em;
      }

      /* Italic text in lists — inline, default color */
      #main-content ul li em {
        font-style: italic;
        color: var(--text);
      }

      /* Hide orphan <br> at end of list items (Jekyll artifact) */
      #main-content ul li br:last-child {
        display: none;
      }

      /* Links inside content */
      #main-content a {
        color: var(--blue);
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: border-color 0.15s, color 0.15s;
      }

      #main-content a:hover {
        color: var(--gold);
        border-bottom-color: var(--gold-dim);
      }

      /* Strong in body text */
      #main-content p strong {
        color: var(--text);
        font-weight: 500;
      }

      /* ── Footer ───────────────────────────────────────────────────── */
      footer {
        border-top: 1px solid var(--border);
        padding: 1.5rem 2rem;
        text-align: center;
        font-family: var(--mono);
        font-size: 0.7rem;
        color: var(--text-muted);
        letter-spacing: 0.1em;
      }

      /* ── Scrollbar ────────────────────────────────────────────────── */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

      /* ── Responsive ───────────────────────────────────────────────── */
      @media (max-width: 600px) {
        header { padding: 2.5rem 0 2rem; }
        header::before { font-size: 7rem; opacity: 0.6; right: -0.5rem; }
        #content-wrapper { padding: 2rem 1.25rem 4rem; }
        #main-content h2 { font-size: 1.6rem; }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="header-inner">
        <p class="eyebrow">Portfólio</p>
        <h1>{{ site.title | default: site.github.repository_name }}</h1>
        <h2>{{ site.description | default: site.github.project_tagline }}</h2>
      </div>
    </header>

    <div id="content-wrapper">
      <section id="main-content">
        {{ content }}
      </section>
    </div>

    <footer>
      <span>Saiba mais em: <a href="https://github.com/joaopedroangelo" style="color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold-dim);">github.com/joaopedroangelo</a></span>
    </footer>

    <script>
      // Auto-number the h2 sections
      document.querySelectorAll('#main-content h2').forEach((el, i) => {
        el.setAttribute('data-number', String(i + 1).padStart(2, '0'));
      });

      // Fix experience-style list items: strong (title) + BR + em (date) + BR + description
      // Only apply block display when a BR exists between strong and first em (date pattern)
      document.querySelectorAll('#main-content ul li').forEach(li => {
        const strong = li.querySelector('strong');
        const firstEm = li.querySelector('em');
        if (!strong || !firstEm) return;

        const nodes = [...li.childNodes];
        const strongIdx = nodes.indexOf(strong);
        const emIdx = nodes.indexOf(firstEm);
        if (strongIdx === -1 || emIdx === -1 || emIdx <= strongIdx) return;

        const between = nodes.slice(strongIdx + 1, emIdx);
        const hasBr = between.some(n => n.nodeName === 'BR');
        if (!hasBr) return;

        // It's a title + date item — make both block
        strong.style.cssText = 'display:block; margin-bottom:3px;';
        firstEm.style.cssText = 'display:block; margin-bottom:5px; font-family:var(--mono); font-size:0.75rem; color:var(--text-muted); font-style:normal;';

        // Remove BR nodes around the date em to avoid extra blank lines
        nodes.forEach(n => { if (n.nodeName === 'BR') n.remove(); });
      });
    </script>
  </body>
</html>
